  default:
    - "\x1b[32m.------.\x1b[0m"
    - "\x1b[32m|\x1b[0m  \x1b[33m^o^\x1b[0m \x1b[32m|\x1b[0m"
    - "\x1b[32m'--++--'\x1b[0m"
    - "\x1b[32m===++===\x1b[0m"

